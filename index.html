<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Oferta Especial</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        .top-banner {
            background-color: #ffffff;
            text-align: center;
            padding: 15px;
            font-size: 18px;
            color: #555;
        }

        .logo {
            background-color: #ff6a00;
            width: 120px;
            margin: 10px auto;
            padding: 20px;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            font-size: 24px;
        }

        .menu {
            background-color: black;
            color: white;
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 15px;
        }

        .menu a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .menu a:hover {
            color: orange;
        }

        .hero {
            height: 500px;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
                        url('https://images.unsplash.com/photo-1519710164239-da123dc03ef4');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .offer-box {
            background-color: #fff3e6;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.3);
            max-width: 500px;
        }

        .offer-box h1 {
            font-size: 40px;
            color: #ff6a00;
            margin: 10px 0;
        }

        .offer-box .discount {
            font-size: 70px;
            font-weight: bold;
            color: #ff6a00;
        }

        .offer-box p {
            color: #555;
        }

        .btn {
            background-color: #4CAF50;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
        }

        .btn:hover {
            background-color: #45a049;
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: #222;
            color: white;
        }
    </style>
</head>
<body>

    <div class="top-banner">
        Ahorra hasta 90% de DTO. 😲
    </div>

    <div class="logo">
        TEMU
    </div>

    <div class="menu">
        <a href="https://xtremmp16.github.io/BxXtReM/">Zapatos</a>
        <a href="https://xtremmp16.github.io/BxXtReM/">Hogar y Cocina</a>
        <a href="https://xtremmp16.github.io/BxXtReM/">Electrónica</a>
        <a href="https://xtremmp16.github.io/BxXtReM/">Belleza y Salud</a>
    </div>

    <div class="hero">
        <div class="offer-box">
            <h1>Hasta un</h1>
            <div class="discount">90%</div>
            <h1>DTO.</h1>
            <button class="btn" onclick="window.location.href='https://xtremmp16.github.io/BxXtReM/'">Compra ahora</button>
            <p>*Solo artículos seleccionados</p>
        </div>
    </div>

    <footer>
        © 2026 Mi Tienda - Todos los derechos reservados
    </footer>

</body>
</html>
